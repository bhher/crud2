apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud2
  labels:
    app: crud2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crud2
  template:
    metadata:
      labels:
        app: crud2
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "waiting for mysql..."
                sleep 3
              done
      containers:
        - name: crud2
          image: 561254776196.dkr.ecr.ap-northeast-2.amazonaws.com/crud2:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx256m"
          readinessProbe:
            httpGet:
              path: /list
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /list
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "384Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
