# EKS 배포 전용 (프로파일: k8s) — 클러스터 내 MySQL Service(mysql:3306) 사용
# docker-compose의 mysql 서비스와 동일한 호스트명·DB 이름

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/crud2_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crud2}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crud2}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false
spring.thymeleaf.cache=true
