# Docker / docker-compose 실행 전용 (프로파일: docker)
# compose 네트워크 내 MySQL 서비스(mysql:3306)에 연결합니다.

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/crud2_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:crud2}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:crud2}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

spring.thymeleaf.cache=true
